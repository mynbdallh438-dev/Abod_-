<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>موقعي الشخصي</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: 'Tajawal', sans-serif;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      color: #ffffff;
      text-align: center;
      padding: 50px;
      transition: 0.5s;
      font-size: 20px;
    }

    h1 {
      color: #00ffff;
      font-size: 32px;
    }

    p {
      color: #cccccc;
      font-size: 18px;
    }

    a.subscribe {
      display: inline-block;
      padding: 20px 40px;
      background-color: #00ffff;
      color: #000;
      text-decoration: none;
      border-radius: 8px;
      font-weight: bold;
      font-size: 18px;
      transition: 0.3s;
    }

    a.subscribe:hover {
      box-shadow: 0 0 25px #00ffff;
      transform: scale(1.05);
    }

    h2 {
      margin-top: 50px;
      color: #00ffff;
      font-size: 28px;
    }

    .games {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 30px;
      justify-items: center;
      margin-top: 30px;
    }

    .games a {
      text-decoration: none;
      color: #fff;
      transition: 0.3s;
    }

    .games img {
      border-radius: 10px;
      width: 250px;
      transition: 0.3s;
    }

    .games img:hover {
      transform: scale(1.1);
      box-shadow: 0 0 25px #00ffff;
    }

    .games p {
      margin-top: 10px;
      font-weight: bold;
      color: #00ffff;
      font-size: 18px;
    }

    .lang-btn {
      background-color: #00ffff;
      color: #000;
      border: none;
      padding: 10px 20px;
      margin: 5px;
      border-radius: 6px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    .lang-btn:hover {
      box-shadow: 0 0 15px #00ffff;
    }

    .theme-btn {
      margin-top: 30px;
      padding: 10px 20px;
      background-color: #00ffff;
      color: #000;
      border: none;
      border-radius: 6px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    .theme-btn:hover {
      box-shadow: 0 0 15px #00ffff;
    }
  </style>
</head>
<body>
  <div>
    <button onclick="setLang('ar')" class="lang-btn">العربية</button>
    <button onclick="setLang('en')" class="lang-btn">English</button>
  </div>

  <h1>مرحبًا بكم في موقعي الشخصي</h1>
  <p>هنا تجد روابط قناتي وألعابي المفضلة.</p>
  <a href="https://youtube.com/@abdullahabod710?si=pmiFa3GO04S_IIFB" class="subscribe" target="_blank">اشترك في قناتي</a>

  <h2>🎮 ألعاب المشتركين</h2>
  <div class="games">
    <a href="https://romsfun.com/download/dragon-ball-raging-blast-2-1-35119/2" target="_blank">
      <img src="Dragon-Ball-Raging-Blast-2-ps3.png" alt="Dragon Ball Raging Blast 2">
      <p>Dragon Ball Raging Blast 2</p>
    </a>
  </div>

  <button onclick="toggleTheme()" class="theme-btn">تبديل الوضع</button>

  <script>
    function setLang(lang) {
      if(lang === 'ar') {
        document.querySelector('h1').innerText = "مرحبًا بكم في موقعي الشخصي";
        document.querySelector('p').innerText = "هنا تجد روابط قناتي وألعابي المفضلة.";
        document.querySelector('.subscribe').innerText = "اشترك في قناتي";
        document.querySelector('h2').innerText = "🎮 ألعاب المشتركين";
        document.querySelector('.theme-btn').innerText = "تبديل الوضع";
      } else {
        document.querySelector('h1').innerText = "Welcome to my personal site";
        document.querySelector('p').innerText = "Here you can find my channel and favorite games.";
        document.querySelector('.subscribe').innerText = "Subscribe to my channel";
        document.querySelector('h2').innerText = "🎮 Subscribers' Games";
        document.querySelector('.theme-btn').innerText = "Toggle Theme";
      }
    }

    function toggleTheme() {
      const body = document.body;
      if(body.style.background.includes('linear-gradient')) {
        body.style.background = '#ffffff';
        body.style.color = '#000000';
      } else {
        body.style.background = 'linear-gradient(135deg, #0f2027, #203a43, #2c5364)';
        body.style.color = '#ffffff';
      }
    }
  </script>
</body>
</html>
