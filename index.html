<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>قناتي على يوتيوب</title>
  <style>
    body {
      background-color: #121212;
      color: #ffffff;
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 50px;
    }

    h1 {
      color: #00ffff;
    }

    a.subscribe {
      display: inline-block;
      padding: 15px 30px;
      background-color: #00ffff;
      color: #121212;
      text-decoration: none;
      font-weight: bold;
      border-radius: 8px;
      transition: 0.3s;
    }

    a.subscribe:hover {
      background-color: #ffffff;
      color: #121212;
    }

    .games {
      margin-top: 60px;
    }

    .games h2 {
      color: #00ffff;
      margin-bottom: 20px;
    }

    .game-links a {
      display: inline-block;
      margin: 10px;
      padding: 10px 20px;
      background-color: #00ffff;
      color: #121212;
      text-decoration: none;
      border-radius: 8px;
      font-weight: bold;
      transition: 0.3s;
    }

    .game-links a:hover {
      background-color: #ffffff;
      color: #121212;
    }
  </style>
</head>
<body>
  <h1>مرحبًا بكم في موقعي الشخصي</h1>
  <p>هنا تجد روابط قناتي وألعابي المفضلة.</p>
  <a href="https://youtube.com/@abdullahabod710" class="subscribe" target="_blank">اشترك في قناتي</a>

  <section class="games">
    <h2>🎮 ألعاب المشتركين</h2>
    <div class="game-links">
      <a href="https://example.com/game1" target="_blank">لعبة 1</a>
      <a href="https://example.com/game2" target="_blank">لعبة 2</a>
      <a href="https://example.com/game3" target="_blank">لعبة 3</a>
    </div>
  </section>
</body>
</html>
