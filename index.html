<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>موقعي الشخصي</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: 'Tajawal', sans-serif;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      color: #ffffff;
      text-align: center;
      padding: 50px;
    }

    h1 {
      color: #00ffff;
      margin-bottom: 10px;
    }

    p {
      color: #cccccc;
      margin-bottom: 30px;
    }

    a.subscribe {
      display: inline-block;
      padding: 15px 30px;
      background-color: #00ffff;
      color: #000;
      text-decoration: none;
      border-radius: 8px;
      font-weight: bold;
      transition: 0.3s;
    }

    a.subscribe:hover {
      box-shadow: 0 0 20px #00ffff;
      transform: scale(1.05);
    }

    h2 {
      margin-top: 50px;
      color: #00ffff;
    }

    .games {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
      margin-top: 20px;
    }

    .games a {
      text-decoration: none;
      color: #fff;
      transition: 0.3s;
    }

    .games img {
      border-radius: 10px;
      width: 200px;
      transition: 0.3s;
    }

    .games img:hover {
      transform: scale(1.1);
      box-shadow: 0 0 20px #00ffff;
    }

    .games p {
      margin-top: 10px;
      font-weight: bold;
      color: #00ffff;
    }
  </style>
</head>
<body>
  <h1>مرحبًا بكم في موقعي الشخصي</h1>
  <p>هنا تجد روابط قناتي وألعابي المفضلة.</p>
  <a href="#" class="subscribe">اشترك في قناتي</a>

  <h2>🎮 ألعاب المشتركين</h2>
  <div class="games">
    <a href="https://romsfun.com/download/dragon-ball-raging-blast-2-1-35119/2" target="_blank">
      <img src="Dragon-Ball-Raging-Blast-2-ps3.png" alt="Dragon Ball Raging Blast 2">
      <p>Dragon Ball Raging Blast 2</p>
    </a>
  </div>
</body>
</html>
