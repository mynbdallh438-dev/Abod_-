<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>موقعي الشخصي</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      /* خلفية داكنة مريحة وعميقة */
      --bg-gradient: linear-gradient(135deg, #0f172a 0%, #111827 50%, #1e293b 100%);
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --accent-color: #00f0ff;
      --card-bg: rgba(30, 41, 59, 0.7);
    }

    .light-theme {
      /* خلفية فاتحة ناعمة (ليست بيضاء فاقعة) لحماية العين */
      --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
      --text-main: #0f172a;
      --text-muted: #475569;
      --card-bg: rgba(255, 255, 255, 0.9);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; transition: background 0.4s ease, color 0.3s ease, transform 0.3s ease; }

    body {
      font-family: 'Tajawal', sans-serif;
      background: var(--bg-gradient);
      background-attachment: fixed; /* تجعل الخلفية ثابتة ومريحة أثناء التمرير */
      color: var(--text-main);
      padding: 30px 20px;
      line-height: 1.6;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }

    /* أزرار التحكم العلوي */
    .top-controls { margin-bottom: 40px; display: flex; gap: 12px; }
    .top-controls button {
      padding: 10px 20px;
      font-size: 1rem;
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: var(--card-bg);
      color: var(--text-main);
      cursor: pointer;
      font-weight: bold;
      box-shadow: 0 4px 6px rgba(0,0,0,0.05);
    }
    .top-controls button:hover {
      border-color: var(--accent-color);
    }

    /* العنوان والنص */
    h1 { font-size: 2.6rem; color: var(--accent-color); margin-bottom: 15px; font-weight: 900; }
    p { font-size: 1.4rem; margin-bottom: 30px; color: var(--text-muted); }

    /* زر الاشتراك */
    .subscribe-btn {
      display: inline-block;
      padding: 18px 45px;
      background: var(--accent-color);
      color: #000;
      font-size: 1.5rem;
      font-weight: 900;
      text-decoration: none;
      border-radius: 15px;
      box-shadow: 0 8px 25px rgba(0, 240, 255, 0.25);
      margin-bottom: 60px;
    }
    .subscribe-btn:hover { transform: scale(1.05); }

    /* قسم الألعاب */
    h2 { font-size: 2.2rem; margin-bottom: 35px; color: var(--accent-color); }
    .games-container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 40px;
      width: 100%;
      max-width: 900px;
    }

    .game-card {
      background: var(--card-bg);
      backdrop-filter: blur(8px); /* تأثير ضبابي خلف البطاقة يزيد من راحة العين */
      padding: 20px;
      border-radius: 20px;
      text-align: center;
      border: 1px solid rgba(255, 255, 255, 0.05);
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }
    .game-card img {
      width: 100%;
      height: 340px;
      object-fit: cover;
      border-radius: 12px;
    }
    .game-card h3 {
      font-size: 1.5rem;
      margin: 15px 0;
    }

    /* زر تحميل اللعبة */
    .download-btn {
      display: inline-block;
      width: 100%;
      padding: 12px;
      background: transparent;
      border: 2px solid var(--accent-color);
      color: var(--text-main);
      font-size: 1.2rem;
      font-weight: bold;
      text-decoration: none;
      border-radius: 10px;
      margin-top: 10px;
    }
    .download-btn:hover {
      background: var(--accent-color);
      color: #000;
      box-shadow: 0 0 15px var(--accent-color);
    }
  </style>
</head>
<body>

  <div class="top-controls">
    <button onclick="setLang('ar')">العربية</button>
    <button onclick="setLang('en')">English</button>
    <button onclick="toggleTheme()">🌓</button>
  </div>

  <h1 id="title">مرحبًا بكم في موقعي</h1>
  <p id="desc">هنا تجد قناتي وألعابي المفضلة.</p>
  
  <a href="https://youtube.com/@abdullahabod710?si=pmiFa3GO04S_IIFB" class="subscribe-btn" id="sub-btn" target="_blank">
    اشترك في قناتي
  </a>

  <h2 id="games-title">🎮 ألعاب المشتركين</h2>

  <div class="games-container">
    <div class="game-card">
      <img src="Dragon-Ball-Raging-Blast-2-ps3.png" alt="Game">
      <h3>Dragon Ball Raging Blast 2</h3>
      <a href="https://romsfun.com/download/dragon-ball-raging-blast-2-1-35119/2" class="download-btn" id="dl-btn-1" target="_blank">
        تنزيل اللعبة
      </a>
    </div>
  </div>

  <script>
    function setLang(lang) {
      if(lang === 'ar') {
        document.getElementById('title').innerText = "مرحبًا بكم في موقعي";
        document.getElementById('desc').innerText = "هنا تجد قناتي وألعابي المفضلة.";
        document.getElementById('sub-btn').innerText = "اشترك في قناتي";
        document.getElementById('games-title').innerText = "🎮 ألعاب المشتركين";
        document.getElementById('dl-btn-1').innerText = "تنزيل اللعبة";
      } else {
        document.getElementById('title').innerText = "Welcome to my site";
        document.getElementById('desc').innerText = "Find my channel and favorite games here.";
        document.getElementById('sub-btn').innerText = "Subscribe Now";
        document.getElementById('games-title').innerText = "🎮 Subscribers' Games";
        document.getElementById('dl-btn-1').innerText = "Download Game";
      }
    }

    function toggleTheme() {
      document.body.classList.toggle('light-theme');
    }
  </script>
</body>
</html>
