<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>موقعي الشخصي</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: 'Tajawal', sans-serif;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      color: #ffffff;
      text-align: center;
      padding: 50px;
    }

    h1 {
      color: #00ffff;
      margin-bottom: 10px;
    }

    p {
      color: #cccccc;
      margin-bottom: 30px;
    }

    a.subscribe {
      display: inline-block;
      padding: 15px 30px;
      background-color: #00ffff;
      color: #000;
      text-decoration: none;
      border-radius: 8px;
      font-weight: bold;
      transition: 0.3s;
    }

    a.subscribe:hover {
      box-shadow: 0 0 20px #00ffff;
      transform: scale(1.05);
    }

    h2 {
      margin-top: 50px;
      color: #00ffff;
    }

    .games {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      justify-items: center;
      margin-top: 20px;
    }

    .games a {
      background-color: #00ffff;
      color: #000;
      padding: 10px 20px;
      border-radius: 6px;
      text-decoration: none;
      font-weight: bold;
      transition: 0.3s;
    }

    .games a:hover {
      box-shadow: 0 0 15px #00ffff;
      transform: scale(1.1);
    }
  </style>
</head>
<body>
  <h1>مرحبًا بكم في موقعي الشخصي</h1>
  <p>هنا تجد روابط قناتي وألعابي المفضلة.</p>
  <a href="#" class="subscribe">اشترك في قناتي</a>

  <h2>🎮 ألعاب المشتركين</h2>
  <div class="games">
    <a href="#">لعبة 1</a>
    <a href="#">لعبة 2</a>
    <a href="#">لعبة 3</a>
  </div>
</body>
</html>
